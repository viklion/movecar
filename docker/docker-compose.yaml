services:
  movecar:
    image: viklion/movecar:latest
    container_name: movecar
    restart: unless-stopped
    ports:
      - "3000:3000" #映射端口
    environment:
      - BARK_URL=           #bark推送地址
      - PHONE_NUMBER=       #手机号
      - CAR_NUMBER=         #车牌号
      # - ALLOWED_COUNTRIES=    #允许访问的国家代码，多个用逗号分隔 例如: CN,HK,MO,TW
      # - ENABLE_GEO_CHECK=     #启用地理位置检查 true/false